<!DOCTYPE html>
<html>
<head>
<title>Eco Pulse Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#e8f5e9;
    text-align:center;
}

/* TITLE */
.title{
    margin-top:15px;
    font-size:40px;
}

.title .eco{
    color:white;
    text-shadow:0 0 10px rgba(255,255,255,0.5);
}

.title .pulse{
    color:#00e676;
    text-shadow:0 0 10px rgba(0,255,100,0.6);
}

/* GRID */
.container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.box{
    background:#111;
    padding:15px;
    border-radius:12px;
}

label{
    display:block;
    margin-top:10px;
    color:#9cff9c;
    font-size:13px;
}

input, select, textarea{
    width:90%;
    padding:8px;
    margin-top:5px;
    border:none;
    border-radius:6px;
    background:#222;
    color:white;
}

/* BUTTON */
button{
    margin-top:20px;
    padding:12px 20px;
    background:#00c853;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-size:16px;
}

/* RESULT */
#resultBox{
    margin-top:15px;
    font-size:18px;
    color:#00e676;
}

/* CHART LAYOUT */
.chartRow{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
    flex-wrap:wrap;
}

.chartBox{
    width:380px;
    background:#111;
    padding:10px;
    border-radius:12px;
}

/* CANVAS SIZE */
canvas{
    width:360px !important;
    height:260px !important;
}

</style>
</head>

<body>

<!-- TITLE -->
<div class="title">
    <span class="eco">ECO</span>
    <span class="pulse"> PULSE 🌱</span>
</div>

<!-- INPUTS -->
<div class="container">

    <div class="box">
        <h3>🚗 Transport</h3>

        <label>Mode</label>
        <select id="mode">
            <option value="car">Car</option>
            <option value="bus">Bus / Metro</option>
            <option value="cycle">Cycle / Walk</option>
        </select>

        <label>KM Driven</label>
        <input type="number" id="km">

        <label>Fuel Type</label>
        <select id="fuel">
            <option value="petrol">Petrol</option>
            <option value="diesel">Diesel</option>
            <option value="electric">Electric</option>
        </select>
    </div>

    <div class="box">
        <h3>🏠 Energy</h3>

        <label>Electricity (kWh/month)</label>
        <input type="number" id="electricity">

        <label>Energy Source</label>
        <textarea id="source"></textarea>
    </div>

    <div class="box">
        <h3>🍽 Diet</h3>

        <label>Diet Type</label>
        <select id="diet">
            <option value="meat">Meat Based</option>
            <option value="veg">Vegetarian</option>
            <option value="omni">Omnivore</option>
        </select>

        <label>Food Waste</label>
        <select id="foodwaste">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
        </select>
    </div>

    <div class="box">
        <h3>♻️ Recycling</h3>

        <label>Waste Recycled</label>
        <select id="recycle">
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>
    </div>

</div>

<!-- BUTTON -->
<button onclick="calculate()">🌱 Calculate Eco Pulse</button>

<div id="resultBox"></div>

<!-- CHARTS -->
<div class="chartRow">

    <div class="chartBox">
        <canvas id="barChart"></canvas>
    </div>

    <div class="chartBox">
        <canvas id="pieChart"></canvas>
    </div>

</div>

<script>

function calculate(){

    let km = Number(document.getElementById("km").value);
    let mode = document.getElementById("mode").value;
    let fuel = document.getElementById("fuel").value;

    let electricity = Number(document.getElementById("electricity").value);

    let diet = document.getElementById("diet").value;
    let foodwaste = document.getElementById("foodwaste").value;
    let recycle = document.getElementById("recycle").value;

    // 🚗 TRANSPORT
    let modeFactor = {car:0.2, bus:0.08, cycle:0};
    let fuelFactor = {petrol:0.22, diesel:0.25, electric:0.05};

    let transport = km * modeFactor[mode] * fuelFactor[fuel];

    // 🏠 ENERGY
    let energy = electricity * 0.5;

    // 🍽 DIET
    let dietVal = diet==="meat"?6:diet==="omni"?4:2;

    // 🗑 FOOD WASTE
    let wasteVal = foodwaste==="high"?4:foodwaste==="medium"?2:1;

    // ♻️ RECYCLE
    let recycleVal = recycle==="yes"?-3:2;

    let total = transport + energy + dietVal + wasteVal + recycleVal;

    // 🔢 PERCENTAGE
    let tPercent = (transport/total)*100;
    let ePercent = (energy/total)*100;
    let dPercent = (dietVal/total)*100;
    let wPercent = (wasteVal/total)*100;
    let rPercent = (recycleVal/total)*100;

    document.getElementById("resultBox").innerHTML =
    `
    🌍 <b>Total Eco Pulse:</b> ${total.toFixed(2)} kg CO₂ <br><br>
    🚗 Transport: ${transport.toFixed(1)} kg (${tPercent.toFixed(1)}%)<br>
    🏠 Energy: ${energy.toFixed(1)} kg (${ePercent.toFixed(1)}%)<br>
    🍽 Diet: ${dietVal.toFixed(1)} kg (${dPercent.toFixed(1)}%)<br>
    🗑 Waste: ${wasteVal.toFixed(1)} kg (${wPercent.toFixed(1)}%)<br>
    ♻️ Recycling: ${recycleVal.toFixed(1)} kg (${rPercent.toFixed(1)}%)
    `;

    // 🌿 GREEN SHADES
    let greens = [
        "#0b3d0b", // dark green
        "#00e676", // bright green
        "#66bb6a", // light green
        "#2e7d32", // bottle green
        "#a5d6a7"  // mint green
    ];

    // 📊 BAR
    new Chart(document.getElementById("barChart"),{
        type:"bar",
        data:{
            labels:["Transport","Energy","Diet","Waste","Recycle"],
            datasets:[{
                data:[transport,energy,dietVal,wasteVal,recycleVal],
                backgroundColor:greens
            }]
        }
    });

    // 🥧 DOUGHNUT (PIPE STYLE)
    new Chart(document.getElementById("pieChart"),{
        type:"doughnut",
        data:{
            labels:["Transport","Energy","Diet","Waste","Recycle"],
            datasets:[{
                data:[transport,energy,dietVal,wasteVal,recycleVal],
                backgroundColor:greens,
                borderWidth:2,
                borderColor:"#000"
            }]
        },
        options:{
            cutout:"55%"   // makes it pipe-like
        }
    });

}

</script>

</body>
</html>
